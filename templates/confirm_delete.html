{% extends 'base.html' %}
{% block title %}确认删除{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
                <h5 class="mt-3">确认删除</h5>
                <p class="text-muted">确定要删除 <strong>{{ obj }}</strong> 吗？此操作不可撤销。</p>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">确认删除</button>
                </form>
                <a href="{{ cancel_url }}" class="btn btn-secondary">取消</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
