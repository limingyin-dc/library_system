{% extends 'base.html' %}
{% block title %}借书申请审批{% endblock %}
{% block content %}
<h5 class="mb-3">待审批借书申请</h5>
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>读者</th><th>书名</th><th>申请日期</th><th>操作</th></tr>
            </thead>
            <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.reader.name }}（{{ req.reader.card_no }}）</td>
                <td>{{ req.book.title }}</td>
                <td>{{ req.request_date }}</td>
                <td><a href="{% url 'borrow_request_approve' req.pk %}" class="btn btn-sm btn-primary">审批</a></td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center text-muted">暂无待审批申请</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
