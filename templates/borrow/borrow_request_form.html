{% extends 'base.html' %}
{% block title %}申请借书{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>申请借书</h5>
    <a href="{% url 'my_borrows' %}" class="btn btn-sm btn-outline-secondary">返回</a>
</div>
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>书名</th><th>作者</th><th>分类</th><th>可借数量</th><th>操作</th></tr>
            </thead>
            <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.category }}</td>
                <td>{{ book.available_copies }}</td>
                <td>
                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="book_id" value="{{ book.pk }}">
                        <button class="btn btn-sm btn-primary">申请</button>
                    </form>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5" class="text-center text-muted">暂无可借图书</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
